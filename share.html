<!DOCTYPE html>
<html>
  <body>
    <h1>画像を受け取りました</h1>

    <div id="preview"></div>

    <script>
      (async () => {
        // Service Worker が保存した画像を取得
        const cache = await caches.open("shared-files");
        const res = await cache.match("/test/shared-image");

        if (res) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          const img = document.createElement("img");
          img.src = url;
          img.style.maxWidth = "100%";
          document.getElementById("preview").appendChild(img);
        } else {
          document.getElementById("preview").textContent = "画像がありません";
        }
      })();
    </script>
  </body>
</html>
